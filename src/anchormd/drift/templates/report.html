<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drift Detection Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 2rem; }
        h1 { color: #00ff88; margin-bottom: 1.5rem; }
        h2 { color: #88ccff; margin: 1.5rem 0 1rem; }
        .card { background: #1a1a1a; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #333; }
        .chart-container { max-width: 800px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid #333; }
        th { color: #88ccff; font-weight: 600; }
        .critical { color: #ff4444; }
        .warning { color: #ffaa00; }
        .stable { color: #00ff88; }
        .improved { color: #44ccff; }
        .footer { margin-top: 2rem; color: #666; font-size: 0.85rem; text-align: center; }
    </style>
</head>
<body>
    <h1>Agent Drift Report</h1>

    <div class="card">
        <h2>Score Trend</h2>
        <div class="chart-container">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h2>Run History</h2>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Model</th>
                    <th>Score</th>
                    <th>Delta</th>
                    <th>Severity</th>
                </tr>
            </thead>
            <tbody>
                {% for run in history %}
                <tr>
                    <td>{{ run.timestamp[:10] }}</td>
                    <td>{{ run.model }}</td>
                    <td>{{ "%.2f"|format(run.score) }}</td>
                    <td>{{ "%+.2f"|format(run.delta) }}</td>
                    <td class="{{ run.severity }}">{{ run.severity|upper }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="footer">
        Generated by ClaudeMD Forge — Agent Drift Detector
    </div>

    <script>
        const ctx = document.getElementById('trendChart').getContext('2d');
        const labels = {{ labels }};
        const scores = {{ scores }};
        const severities = {{ severities }};

        const colorMap = {
            'critical': '#ff4444',
            'warning': '#ffaa00',
            'stable': '#00ff88',
            'improved': '#44ccff',
        };

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Score',
                    data: scores,
                    borderColor: '#00ff88',
                    backgroundColor: 'rgba(0, 255, 136, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointBackgroundColor: severities.map(s => colorMap[s] || '#00ff88'),
                    pointRadius: 6,
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        min: 0, max: 1,
                        grid: { color: '#333' },
                        ticks: { color: '#888' },
                    },
                    x: {
                        grid: { color: '#333' },
                        ticks: { color: '#888' },
                    }
                },
                plugins: {
                    legend: { labels: { color: '#e0e0e0' } }
                }
            }
        });
    </script>
</body>
</html>
