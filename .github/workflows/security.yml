name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || pip install -r requirements.txt
          pip install pip-audit
      - name: Run pip-audit
        run: |
          # `pip-audit` scans the active environment. Exclude the installer itself
          # so toolchain CVEs in `pip` don't block repository dependency checks.
          python -m pip freeze | grep -v '^pip==' > /tmp/audit-requirements.txt
          pip-audit -r /tmp/audit-requirements.txt
