app = 'cmdf-license'
primary_region = 'sjc'

[build]
  dockerfile = "Dockerfile"

[env]
  CMDF_DB_PATH = "/data/license_server.db"
  # Litestream secrets (set via `fly secrets set`):
  # LITESTREAM_REPLICA_BUCKET, LITESTREAM_REPLICA_ENDPOINT,
  # LITESTREAM_ACCESS_KEY_ID, LITESTREAM_SECRET_ACCESS_KEY

[mounts]
  source = "cmdf_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
